<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Telsiz" />
  <link rel="manifest" href="/manifest.json" />
  <title>Telsiz</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.5/dist/livekit-client.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 24px;
      padding: 20px;
    }
    h1 { font-size: 2rem; letter-spacing: 4px; color: #f5a623; text-transform: uppercase; }

    /* Auth */
    #auth-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #auth-screen p { color: #a0a0c0; font-size: 0.95rem; }
    #auth-screen input {
      background: #16213e; border: 2px solid #0f3460; border-radius: 10px;
      color: #e0e0e0; font-size: 1.1rem; letter-spacing: 3px;
      padding: 12px 20px; text-align: center; outline: none; width: 240px;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus { border-color: #f5a623; }
    #auth-screen input.shake { animation: shake 0.4s ease; border-color: #f87171; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }
    #auth-btn {
      background: #f5a623; border: none; border-radius: 10px;
      color: #1a1a2e; cursor: pointer; font-size: 1rem;
      font-weight: bold; letter-spacing: 1px; padding: 12px 32px;
    }
    #auth-btn:disabled { background: #888; cursor: not-allowed; }
    #auth-error { color: #f87171; font-size: 0.85rem; min-height: 1.2em; }

    /* Main */
    #main-screen { display: none; flex-direction: column; align-items: center; gap: 24px; }
    #status-bar {
      background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
      padding: 12px 24px; font-size: 0.9rem; color: #a0a0c0;
      text-align: center; min-width: 260px;
    }
    #status-bar span { font-weight: bold; color: #f5a623; }

    #indicator {
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a2a4a, #0d0d1a);
      border: 4px solid #0f3460;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
      transition: box-shadow 0.2s, border-color 0.2s;
      font-size: 0.85rem; color: #7070a0;
    }
    #indicator.receiving {
      border-color: #4ade80;
      box-shadow: 0 0 40px rgba(74,222,128,0.5);
      color: #4ade80;
    }
    #indicator svg { width: 56px; height: 56px; fill: #4a4a7a; transition: fill 0.2s; }
    #indicator.receiving svg { fill: #4ade80; }

    #ptt-btn {
      width: 140px; height: 140px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 40% 35%, #e05c00, #a33c00);
      color: white; font-size: 1rem; font-weight: bold; letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    #ptt-btn:active, #ptt-btn.active {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 2px 6px rgba(0,0,0,0.4);
      background: radial-gradient(circle at 40% 35%, #ff7a20, #c04a00);
    }
    #ptt-btn:disabled { background: radial-gradient(circle at 40% 35%, #444, #222); cursor: not-allowed; }
    #label { font-size: 0.8rem; color: #6060a0; text-align: center; }

    #log {
      background: #0d1b2a; border: 1px solid #1a3050; border-radius: 8px;
      padding: 10px 14px; font-size: 0.78rem; color: #6080a0;
      width: 300px; max-height: 100px; overflow-y: auto; font-family: monospace;
    }
    #log p { margin-bottom: 3px; }
    #log p.ok   { color: #4ade80; }
    #log p.err  { color: #f87171; }
    #log p.info { color: #f5a623; }
  </style>
</head>
<body>
  <h1>📻 Telsiz</h1>

  <div id="auth-screen">
    <p>Kanala katılmak için şifreyi gir</p>
    <input id="pw-input" type="password" placeholder="••••••••" maxlength="32" />
    <button id="auth-btn">KATIL</button>
    <div id="auth-error"></div>
  </div>

  <div id="main-screen">
    <div id="status-bar">
      Bağlantı: <span id="conn-status">Bağlanıyor...</span> &nbsp;|&nbsp;
      Kanaldaki kullanıcı: <span id="user-count">0</span>
    </div>
    <div id="indicator">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2z"/></svg>
      <span id="rx-label">Bekleniyor</span>
    </div>
    <button id="ptt-btn" disabled>KONUŞ</button>
    <div id="label">Düğmeye basılı tut → konuş</div>
    <div id="log"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

    // iOS arka plan ses oturumunu canlı tut
    let silentSource = null;
    function startSilentAudio(ctx) {
      if (silentSource) return;
      const buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      function loop() {
        silentSource = ctx.createBufferSource();
        silentSource.buffer = buf;
        silentSource.connect(ctx.destination);
        silentSource.onended = loop;
        silentSource.start();
      }
      loop();
    }

    const $ = id => document.getElementById(id);
    const authScreen = $('auth-screen'), mainScreen = $('main-screen');
    const pwInput = $('pw-input'), authBtn = $('auth-btn'), authError = $('auth-error');
    const btn = $('ptt-btn'), connStatus = $('conn-status');
    const userCount = $('user-count'), indicator = $('indicator'), rxLabel = $('rx-label');
    const logEl = $('log');

    function log(msg, cls = '') {
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(p);
    }

    const { Room, RoomEvent, Track, createLocalAudioTrack } = LivekitClient;

    let room = null;
    let localAudioTrack = null;
    let isTalking = false;

    function updateUserCount() {
      if (!room) return;
      userCount.textContent = room.numParticipants;
    }

    function setReceiving(state) {
      if (state) {
        indicator.classList.add('receiving');
        rxLabel.textContent = 'Alıyor...';
      } else {
        indicator.classList.remove('receiving');
        rxLabel.textContent = 'Bekleniyor';
      }
    }

    // Kayıtlı şifreyle otomatik bağlan
    const savedPw = localStorage.getItem('telsiz_pw');
    if (savedPw) { pwInput.value = savedPw; setTimeout(tryAuth, 100); }

    async function tryAuth() {
      const password = pwInput.value.trim();
      if (!password) return;
      authBtn.disabled = true;
      authError.textContent = '';

      try {
        const res = await fetch('/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, identity: 'kullanici-' + Math.random().toString(36).slice(2, 7) }),
        });

        if (res.status === 401) {
          localStorage.removeItem('telsiz_pw');
          authError.textContent = 'Şifre yanlış!';
          pwInput.classList.add('shake');
          setTimeout(() => pwInput.classList.remove('shake'), 500);
          authBtn.disabled = false;
          return;
        }

        if (!res.ok) {
          const text = await res.text();
          authError.textContent = `Sunucu hatası ${res.status}: ${text}`;
          authBtn.disabled = false;
          return;
        }
        const data = await res.json();
        console.log('Token alındı, URL:', data.url);
        if (!data.url || !data.token) {
          authError.textContent = 'Sunucu token döndürmedi. Env var eksik olabilir.';
          authBtn.disabled = false;
          return;
        }
        localStorage.setItem('telsiz_pw', password);
        await joinRoom(data.token, data.url);
      } catch (e) {
        authError.textContent = 'Hata: ' + e.message;
        console.error(e);
        authBtn.disabled = false;
      }
    }

    async function joinRoom(token, url) {
      room = new Room({ adaptiveStream: false, dynacast: false });

      room.on(RoomEvent.ParticipantConnected,    () => { updateUserCount(); log('Birisi katıldı', 'info'); });
      room.on(RoomEvent.ParticipantDisconnected, () => { updateUserCount(); log('Birisi ayrıldı', 'info'); });
      room.on(RoomEvent.Disconnected,            () => {
        connStatus.textContent = 'Kesildi'; connStatus.style.color = '#f87171';
        btn.disabled = true; log('Bağlantı kesildi', 'err');
      });

      // Karşı taraf konuşurken gösterge
      room.on(RoomEvent.TrackMuted,   () => setReceiving(false));
      room.on(RoomEvent.TrackUnmuted, (pub, participant) => {
        if (participant !== room.localParticipant && pub.kind === Track.Kind.Audio) setReceiving(true);
      });
      room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
        if (track.kind === Track.Kind.Audio) {
          track.attach(); // gelen sesi otomatik çal
          setReceiving(true);
          log('Karşı taraf konuşuyor', 'info');
        }
      });
      room.on(RoomEvent.TrackUnsubscribed, (track) => {
        if (track.kind === Track.Kind.Audio) { track.detach(); setReceiving(false); }
      });

      await room.connect(url, token, { autoSubscribe: true, audio: false, video: false });
      await room.localParticipant.setMicrophoneEnabled(false);

      // iOS ses oturumunu canlı tut
      startSilentAudio(audioCtx);

      // Ön plana gelince yeniden bağlan
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible' && room.state !== 'connected') {
          log('Yeniden bağlanıyor...', 'info');
          const saved = localStorage.getItem('telsiz_pw');
          if (saved) { pwInput.value = saved; await tryAuth(); }
        }
      });

      authScreen.style.display = 'none';
      mainScreen.style.display = 'flex';
      connStatus.textContent   = 'Bağlandı';
      connStatus.style.color   = '#4ade80';
      btn.disabled             = false;
      updateUserCount();
      log('Kanala katıldı', 'ok');
    }

    async function startTalking() {
      if (isTalking || !room) return;
      isTalking = true;
      btn.classList.add('active');
      btn.textContent = 'KONUŞUYOR';
      log('Konuşma başladı');

      try {
        localAudioTrack = await createLocalAudioTrack({ echoCancellation: true, noiseSuppression: true });
        await room.localParticipant.publishTrack(localAudioTrack);
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
      } catch (e) {
        log('Mikrofon hatası: ' + e.message, 'err');
        stopTalking();
      }
    }

    async function stopTalking() {
      if (!isTalking) return;
      isTalking = false;
      btn.classList.remove('active');
      btn.textContent = 'KONUŞ';
      log('Konuşma bitti');

      if (localAudioTrack) {
        await room.localParticipant.unpublishTrack(localAudioTrack);
        localAudioTrack.stop();
        localAudioTrack = null;
      }
    }

    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryAuth(); });
    authBtn.addEventListener('click', tryAuth);

    btn.addEventListener('mousedown',  startTalking);
    btn.addEventListener('mouseup',    stopTalking);
    btn.addEventListener('mouseleave', stopTalking);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); });
    btn.addEventListener('touchend',   e => { e.preventDefault(); stopTalking(); });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !e.repeat && !btn.disabled && mainScreen.style.display !== 'none') {
        e.preventDefault(); startTalking();
      }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space') { e.preventDefault(); stopTalking(); }
    });
  </script>
</body>
</html>
