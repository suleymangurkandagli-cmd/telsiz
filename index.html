<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Telsiz" />
  <link rel="manifest" href="/manifest.json" />
  <title>Telsiz</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.5/dist/livekit-client.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 24px;
      padding: 20px;
    }
    h1 { font-size: 2rem; letter-spacing: 4px; color: #f5a623; text-transform: uppercase; }

    /* Auth */
    #auth-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #auth-screen p { color: #a0a0c0; font-size: 0.95rem; }
    #auth-screen input {
      background: #16213e; border: 2px solid #0f3460; border-radius: 10px;
      color: #e0e0e0; font-size: 1.1rem; letter-spacing: 3px;
      padding: 12px 20px; text-align: center; outline: none; width: 240px;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus { border-color: #f5a623; }
    #auth-screen input.shake { animation: shake 0.4s ease; border-color: #f87171; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }
    #auth-btn {
      background: #f5a623; border: none; border-radius: 10px;
      color: #1a1a2e; cursor: pointer; font-size: 1rem;
      font-weight: bold; letter-spacing: 1px; padding: 12px 32px;
    }
    #auth-btn:disabled { background: #888; cursor: not-allowed; }
    #auth-error { color: #f87171; font-size: 0.85rem; min-height: 1.2em; }

    /* Main */
    #main-screen { display: none; flex-direction: column; align-items: center; gap: 24px; }
    #status-bar {
      background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
      padding: 12px 24px; font-size: 0.9rem; color: #a0a0c0;
      text-align: center; min-width: 260px;
    }
    #status-bar span { font-weight: bold; color: #f5a623; }

    #indicator {
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a2a4a, #0d0d1a);
      border: 4px solid #0f3460;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
      transition: box-shadow 0.2s, border-color 0.2s;
      font-size: 0.85rem; color: #7070a0;
    }
    #indicator.receiving {
      border-color: #4ade80;
      box-shadow: 0 0 40px rgba(74,222,128,0.5);
      color: #4ade80;
    }
    #indicator svg { width: 56px; height: 56px; fill: #4a4a7a; transition: fill 0.2s; }
    #indicator.receiving svg { fill: #4ade80; }

    #ptt-btn {
      width: 140px; height: 140px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 40% 35%, #e05c00, #a33c00);
      color: white; font-size: 1rem; font-weight: bold; letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    #ptt-btn:active, #ptt-btn.active {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 2px 6px rgba(0,0,0,0.4);
      background: radial-gradient(circle at 40% 35%, #ff7a20, #c04a00);
    }
    #ptt-btn:disabled { background: radial-gradient(circle at 40% 35%, #444, #222); cursor: not-allowed; }
    #label { font-size: 0.8rem; color: #6060a0; text-align: center; }

    #log {
      background: #0d1b2a; border: 1px solid #1a3050; border-radius: 8px;
      padding: 10px 14px; font-size: 0.78rem; color: #6080a0;
      width: 300px; max-height: 100px; overflow-y: auto; font-family: monospace;
    }
    #log p { margin-bottom: 3px; }
    #log p.ok   { color: #4ade80; }
    #log p.err  { color: #f87171; }
    #log p.info { color: #f5a623; }

    /* --- Kamera butonu --- */
    #snap-btn {
      display: flex; align-items: center; gap: 8px;
      background: transparent;
      border: 1px solid #1e2540;
      border-radius: 8px;
      color: #5a6a8a;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 9px 18px;
      transition: border-color 0.15s, color 0.15s;
    }
    #snap-btn:not(:disabled):hover { border-color: #f5a623; color: #f5a623; }
    #snap-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #snap-btn svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    /* --- Galeri --- */
    #gallery-section {
      width: 100%;
      max-width: 360px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #gallery-section.visible { display: flex; }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .gallery-label {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2e3a52;
    }
    .gallery-count {
      font-family: -apple-system, 'SF Mono', 'Menlo', monospace;
      font-size: 0.65rem;
      color: #2e3a52;
    }

    #gallery-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    #gallery-scroll::-webkit-scrollbar { display: none; }

    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 72px;
      cursor: pointer;
    }
    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 4px;
      object-fit: cover;
      display: block;
      border: 1px solid #1a2236;
      transition: opacity 0.15s;
    }
    .thumb-wrap:hover .thumb { opacity: 0.85; }
    .thumb-wrap.unread::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #f5a623;
      border-radius: 4px 4px 0 0;
      z-index: 1;
    }
    .thumb-sender {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 9px;
      font-weight: 600;
      color: #c8d0e0;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .thumb-time {
      font-family: -apple-system, 'SF Mono', 'Menlo', monospace;
      font-size: 0.58rem;
      color: #2e3a52;
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }
    .thumb-wrap.unread .thumb-time { color: #f5a623; }
    .thumb-del {
      position: absolute; top: 3px; right: 3px;
      width: 18px; height: 18px;
      border: none; border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #c8d0e0; font-size: 14px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; opacity: 0.6;
      transition: opacity 0.15s, background 0.15s;
    }
    .thumb-del:hover, .thumb-del:active { opacity: 1; background: rgba(200,50,50,0.75); }

    /* --- Tam ekran viewer --- */
    #viewer {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #viewer.open {
      opacity: 1;
      pointer-events: all;
    }
    #viewer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 20px 12px;
      flex-shrink: 0;
    }
    #viewer-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #viewer-sender {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #c8d0e0;
    }
    #viewer-time {
      font-family: -apple-system, 'SF Mono', 'Menlo', monospace;
      font-size: 0.65rem;
      color: #3a4a62;
      letter-spacing: 0.08em;
    }
    #viewer-close {
      width: 32px; height: 32px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      color: #6080a0;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    #viewer-close:hover { background: rgba(255,255,255,0.12); color: #c8d0e0; }

    #viewer-photo-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      cursor: pointer;
    }
    #viewer-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 3px;
    }

    #viewer-progress-wrap {
      padding: 16px 20px 36px;
      flex-shrink: 0;
    }
    #viewer-progress-track {
      width: 100%;
      height: 1px;
      background: #1a2236;
      position: relative;
      overflow: hidden;
    }
    #viewer-progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 100%;
      background: #f5a623;
      transform-origin: left center;
      transition: transform linear;
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:12px;">
    <h1>📻 Telsiz</h1>
    <button id="clear-cache-btn" title="Cache temizle ve güncelle" style="background:#16213e;border:1px solid #0f3460;border-radius:8px;color:#a0a0c0;cursor:pointer;font-size:0.75rem;padding:6px 10px;letter-spacing:1px;">↺ GÜNCELLE</button>
  </div>

  <div id="auth-screen">
    <p>Kanala katılmak için şifreyi gir</p>
    <input id="pw-input" type="password" placeholder="••••••••" maxlength="32" />
    <button id="auth-btn">KATIL</button>
    <div id="auth-error"></div>
  </div>

  <div id="main-screen">
    <div id="status-bar">
      Bağlantı: <span id="conn-status">Bağlanıyor...</span> &nbsp;|&nbsp;
      Kanaldaki kullanıcı: <span id="user-count">0</span>
    </div>
    <div id="indicator">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2z"/></svg>
      <span id="rx-label">Bekleniyor</span>
    </div>
    <button id="ptt-btn" disabled>KONUŞ</button>
    <div id="label">Düğmeye basılı tut → konuş</div>

    <button id="snap-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4zm0-8.4A5.2 5.2 0 1 0 12 17.2 5.2 5.2 0 0 0 12 6.8zM9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/></svg>
      Şipşak
    </button>

    <div id="gallery-section">
      <div class="gallery-header">
        <span class="gallery-label">Fotoğraflar</span>
        <span class="gallery-count" id="gallery-count">0</span>
      </div>
      <div id="gallery-scroll"></div>
    </div>

    <div id="log"></div>
  </div>

  <!-- Tam ekran viewer -->
  <div id="viewer">
    <div id="viewer-bar">
      <div id="viewer-meta">
        <div id="viewer-sender"></div>
        <div id="viewer-time"></div>
      </div>
      <button id="viewer-close">✕</button>
    </div>
    <div id="viewer-photo-wrap">
      <img id="viewer-img" alt="" />
    </div>
    <div id="viewer-progress-wrap">
      <div id="viewer-progress-track">
        <div id="viewer-progress-fill"></div>
      </div>
    </div>
  </div>

  <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" />

  <!-- Gelen ses elementleri buraya eklenir (görünmez ama DOM'da olmalı) -->
  <div id="audio-container"></div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

    document.getElementById('clear-cache-btn').addEventListener('click', async () => {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      location.reload(true);
    });

    // iOS arka plan ses oturumunu canlı tut
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Her etkileşimde AudioContext'i uyandır
    const resumeCtx = () => { if (audioCtx.state === 'suspended') audioCtx.resume(); };
    document.addEventListener('touchstart', resumeCtx);
    document.addEventListener('click', resumeCtx);
    let silentSource = null;
    function startSilentAudio() {
      if (silentSource) return;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      function loop() {
        silentSource = audioCtx.createBufferSource();
        silentSource.buffer = buf;
        silentSource.connect(audioCtx.destination);
        silentSource.onended = loop;
        silentSource.start();
      }
      loop();
    }

    const $ = id => document.getElementById(id);
    const authScreen = $('auth-screen'), mainScreen = $('main-screen');
    const pwInput = $('pw-input'), authBtn = $('auth-btn'), authError = $('auth-error');
    const btn = $('ptt-btn'), connStatus = $('conn-status');
    const userCount = $('user-count'), indicator = $('indicator'), rxLabel = $('rx-label');
    const logEl = $('log');

    function log(msg, cls = '') {
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(p);
    }

    const { Room, RoomEvent, Track, createLocalAudioTrack } = LivekitClient;

    let room = null;
    let localAudioTrack = null;
    let isTalking = false;

    function updateUserCount() {
      if (!room) return;
      userCount.textContent = room.numParticipants;
    }

    function setReceiving(state) {
      if (state) {
        indicator.classList.add('receiving');
        rxLabel.textContent = 'Alıyor...';
      } else {
        indicator.classList.remove('receiving');
        rxLabel.textContent = 'Bekleniyor';
      }
    }

    // Kayıtlı şifreyle otomatik bağlan
    const savedPw = localStorage.getItem('telsiz_pw');
    if (savedPw) { pwInput.value = savedPw; setTimeout(tryAuth, 100); }

    // Kalıcı kimlik — yeniden bağlanınca aynı kullanıcı olarak tanınır
    let myIdentity = localStorage.getItem('telsiz_id');
    if (!myIdentity) {
      myIdentity = 'kullanici-' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem('telsiz_id', myIdentity);
    }

    let isConnecting = false;

    async function tryAuth() {
      if (isConnecting) return; // çifte bağlantıyı engelle
      const password = pwInput.value.trim();
      if (!password) return;
      isConnecting = true;
      authBtn.disabled = true;
      authError.textContent = '';

      try {
        const res = await fetch('/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, identity: myIdentity }),
        });

        if (res.status === 401) {
          localStorage.removeItem('telsiz_pw');
          authError.textContent = 'Şifre yanlış!';
          pwInput.classList.add('shake');
          setTimeout(() => pwInput.classList.remove('shake'), 500);
          authBtn.disabled = false;
          return;
        }

        if (!res.ok) {
          const text = await res.text();
          authError.textContent = `Sunucu hatası ${res.status}: ${text}`;
          authBtn.disabled = false;
          return;
        }
        const data = await res.json();
        console.log('Token alındı, URL:', data.url);
        if (!data.url || !data.token) {
          authError.textContent = 'Sunucu token döndürmedi. Env var eksik olabilir.';
          authBtn.disabled = false;
          return;
        }
        localStorage.setItem('telsiz_pw', password);
        await joinRoom(data.token, data.url);
      } catch (e) {
        authError.textContent = 'Hata: ' + e.message;
        console.error(e);
        authBtn.disabled = false;
        scheduleReconnect(); // başarısız olursa tekrar dene
      } finally {
        isConnecting = false;
      }
    }

    const audioContainer = document.getElementById('audio-container');

    // Ses çalma kilidi açılana kadar bekleyenleri başlat (LiveKit resmi yöntemi)
    function ensureAudioPlayback() {
      if (room && !room.canPlaybackAudio) {
        log('Sese izin vermek için ekrana dokun', 'info');
        const unlock = async () => {
          try { await room.startAudio(); log('Ses açıldı', 'ok'); } catch (e) {}
        };
        document.addEventListener('touchend', unlock, { once: true });
        document.addEventListener('click', unlock, { once: true });
      }
    }

    async function joinRoom(token, url) {
      // Eski odayı tamamen kapat — hayalet katılımcı kalmasın
      if (room) {
        try { await room.disconnect(true); } catch (e) {}
        room = null;
      }
      audioContainer.innerHTML = '';
      krispApplied = false;

      room = new Room({
        adaptiveStream: false,
        dynacast: false,
        // Mute'ta track'i öldürme — PTT'de anında aç/kapa için
        stopLocalTrackOnUnpublish: false,
        audioCaptureDefaults: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
      });

      room.on(RoomEvent.ParticipantConnected,    () => { updateUserCount(); log('Birisi katıldı', 'info'); });
      room.on(RoomEvent.ParticipantDisconnected, () => { updateUserCount(); log('Birisi ayrıldı', 'info'); });
      room.on(RoomEvent.Disconnected, () => {
        connStatus.textContent = 'Kesildi'; connStatus.style.color = '#f87171';
        btn.disabled = true; snapBtn.disabled = true;
        log('Bağlantı kesildi, yeniden bağlanılıyor...', 'err');
        scheduleReconnect();
      });

      room.on(RoomEvent.Reconnecting, () => {
        connStatus.textContent = 'Bağlanıyor...'; connStatus.style.color = '#f5a623';
        log('Yeniden bağlanıyor...', 'info');
      });

      room.on(RoomEvent.Reconnected, () => {
        connStatus.textContent = 'Bağlandı'; connStatus.style.color = '#4ade80';
        btn.disabled = false; log('Yeniden bağlandı', 'ok');
      });

      // Tarayıcı ses çalmayı bloklarsa haber verir — LiveKit resmi mekanizması
      room.on(RoomEvent.AudioPlaybackStatusChanged, ensureAudioPlayback);

      // Şipşak fotoğraf bildirimi
      room.on(RoomEvent.DataReceived, onDataReceived);

      // Karşı taraf konuşurken gösterge (sadece uzak ses trackleri)
      room.on(RoomEvent.TrackMuted, (pub, participant) => {
        if (participant !== room.localParticipant && pub.kind === Track.Kind.Audio) setReceiving(false);
      });
      room.on(RoomEvent.TrackUnmuted, (pub, participant) => {
        if (participant !== room.localParticipant && pub.kind === Track.Kind.Audio) setReceiving(true);
      });

      room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
        if (track.kind !== Track.Kind.Audio) return;
        const el = track.attach();
        el.setAttribute('playsinline', '');
        el.autoplay = true;
        el.muted = false;
        audioContainer.appendChild(el); // DOM'da olmalı — iOS aksi halde çalmayabilir
        if (audioCtx.state === 'suspended') audioCtx.resume();
        ensureAudioPlayback();
        if (!pub.isMuted) { setReceiving(true); log('Karşı taraf konuşuyor', 'info'); }
      });
      room.on(RoomEvent.TrackUnsubscribed, (track) => {
        if (track.kind !== Track.Kind.Audio) return;
        track.detach().forEach(el => el.remove());
        setReceiving(false);
      });

      await room.connect(url, token, { autoSubscribe: true, video: false });

      // Mikrofonu bir kere aç, mute başlat — izin bir defa istenir
      await room.localParticipant.setMicrophoneEnabled(true);
      await applyKrispFilter();
      await room.localParticipant.setMicrophoneEnabled(false);

      // iOS ses oturumunu canlı tut + ekran kapanmasın (dinlerken de!)
      startSilentAudio();
      acquireWakeLock();
      ensureAudioPlayback();

      authScreen.style.display = 'none';
      mainScreen.style.display = 'flex';
      connStatus.textContent   = 'Bağlandı';
      connStatus.style.color   = '#4ade80';
      btn.disabled             = false;
      snapBtn.disabled         = false;
      updateUserCount();
      log('Kanala katıldı', 'ok');
    }

    // --- Şipşak fotoğraf & galeri ---
    const snapBtn       = $('snap-btn');
    const photoInput    = $('photo-input');
    const gallerySection = $('gallery-section');
    const galleryScroll = $('gallery-scroll');
    const galleryCount  = $('gallery-count');
    const viewer        = $('viewer');
    const viewerImg     = $('viewer-img');
    const viewerSender  = $('viewer-sender');
    const viewerTime    = $('viewer-time');
    const viewerClose   = $('viewer-close');
    const viewerFill    = $('viewer-progress-fill');

    const GALLERY_KEY = 'telsiz_gallery';

    // localStorage'dan yükle
    function loadGallery() {
      try {
        const raw = localStorage.getItem(GALLERY_KEY);
        if (!raw) return [];
        return JSON.parse(raw).map(item => ({
          ...item,
          ts: new Date(item.ts),
          unread: false,
        }));
      } catch { return []; }
    }

    // localStorage'a kaydet (hata olursa sessizce geç — quota aşımı)
    function saveGallery() {
      try {
        localStorage.setItem(GALLERY_KEY, JSON.stringify(
          photoGallery.map(item => ({ dataUrl: item.dataUrl, sender: item.sender, ts: item.ts.toISOString() }))
        ));
      } catch (e) {
        // Depolama doluysa en eski fotoğrafı at, tekrar dene
        if (photoGallery.length > 1) {
          photoGallery.shift();
          saveGallery();
        }
      }
    }

    const photoGallery = loadGallery(); // { dataUrl, sender, ts, unread }
    let viewerTimer = null;

    function formatTime(date) {
      return date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    }

    function senderInitial(name) {
      if (!name) return '?';
      const clean = name.replace(/^kullanici-/i, '');
      return clean.charAt(0).toUpperCase();
    }

    function deleteFromGallery(item) {
      const idx = photoGallery.indexOf(item);
      if (idx === -1) return;
      photoGallery.splice(idx, 1);
      saveGallery();
      renderGallery();
    }

    function renderGallery() {
      galleryScroll.innerHTML = '';
      galleryCount.textContent = photoGallery.length;
      if (photoGallery.length === 0) {
        gallerySection.classList.remove('visible');
        return;
      }
      gallerySection.classList.add('visible');
      // En yeni en solda
      [...photoGallery].reverse().forEach((item) => {
        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap' + (item.unread ? ' unread' : '');

        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = item.dataUrl;
        img.alt = '';

        const badge = document.createElement('div');
        badge.className = 'thumb-sender';
        badge.textContent = senderInitial(item.sender);

        const del = document.createElement('button');
        del.className = 'thumb-del';
        del.textContent = '×';
        del.title = 'Sil';
        del.addEventListener('click', e => { e.stopPropagation(); deleteFromGallery(item); });

        const time = document.createElement('div');
        time.className = 'thumb-time';
        time.textContent = formatTime(item.ts);

        wrap.appendChild(img);
        wrap.appendChild(badge);
        wrap.appendChild(del);
        wrap.appendChild(time);
        wrap.addEventListener('click', () => {
          item.unread = false;
          wrap.classList.remove('unread');
          openViewer(item.dataUrl, item.sender, item.ts);
        });
        galleryScroll.appendChild(wrap);
      });
    }

    // Galeri başlangıçta yüklüyse göster
    if (photoGallery.length > 0) renderGallery();

    function addToGallery(dataUrl, sender, autoOpen = false) {
      const item = { dataUrl, sender, ts: new Date(), unread: autoOpen };
      photoGallery.push(item);
      saveGallery();
      renderGallery();
      if (autoOpen) {
        item.unread = false;
        openViewer(dataUrl, sender, item.ts);
      }
    }

    function openViewer(dataUrl, sender, ts) {
      viewerImg.src = dataUrl;
      viewerSender.textContent = sender
        ? sender.replace(/^kullanici-/i, '') || sender
        : 'Sen';
      viewerTime.textContent = formatTime(ts);

      // Progress bar — 10 sn
      viewerFill.style.transition = 'none';
      viewerFill.style.transform  = 'scaleX(1)';
      viewer.classList.add('open');

      // Animasyonu bir sonraki frame'de başlat
      requestAnimationFrame(() => requestAnimationFrame(() => {
        viewerFill.style.transition = 'transform 10s linear';
        viewerFill.style.transform  = 'scaleX(0)';
      }));

      clearTimeout(viewerTimer);
      viewerTimer = setTimeout(closeViewer, 10000);
    }

    function closeViewer() {
      viewer.classList.remove('open');
      clearTimeout(viewerTimer);
      viewerFill.style.transition = 'none';
      viewerFill.style.transform  = 'scaleX(0)';
      // Görüntüyü temizle — bellek
      setTimeout(() => { if (!viewer.classList.contains('open')) viewerImg.src = ''; }, 300);
    }

    viewerClose.addEventListener('click', e => { e.stopPropagation(); closeViewer(); });
    $('viewer-photo-wrap').addEventListener('click', closeViewer);

    // Fotoğrafı küçült — hızlı gitsin (max 1200px, JPEG %75)
    function resizeImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const max = 1200;
          let { width, height } = img;
          if (width > max || height > max) {
            const scale = max / Math.max(width, height);
            width  = Math.round(width  * scale);
            height = Math.round(height * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
          URL.revokeObjectURL(img.src);
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    snapBtn.addEventListener('click', () => photoInput.click());

    photoInput.addEventListener('change', async () => {
      const file = photoInput.files[0];
      photoInput.value = '';
      if (!file || !room) return;
      snapBtn.disabled = true;
      try {
        const dataUrl = await resizeImage(file);
        const res = await fetch('/photo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: localStorage.getItem('telsiz_pw'), image: dataUrl }),
        });
        if (!res.ok) throw new Error('Sunucu hatası ' + res.status);
        const { id } = await res.json();
        await room.localParticipant.publishData(
          new TextEncoder().encode(JSON.stringify({ type: 'photo', id })),
          { reliable: true }
        );
        addToGallery(dataUrl, null, true); // gönderen de görür
        log('Şipşak gönderildi', 'ok');
      } catch (e) {
        log('Fotoğraf gönderilemedi: ' + e.message, 'err');
      } finally {
        snapBtn.disabled = false;
      }
    });

    async function onDataReceived(payload, participant) {
      try {
        const msg = JSON.parse(new TextDecoder().decode(payload));
        if (msg.type !== 'photo') return;
        const res = await fetch('/photo/' + msg.id);
        if (!res.ok) return;
        const { image } = await res.json();
        const sender = participant ? participant.identity : 'Bilinmeyen';
        addToGallery(image, sender, true); // otomatik aç
        log('Şipşak geldi!', 'info');
      } catch (e) { /* geçersiz veri */ }
    }

    // Krisp gürültü filtresi (LiveKit Cloud özelliği)
    let krispApplied = false;
    async function applyKrispFilter() {
      if (krispApplied) return;
      try {
        const { KrispNoiseFilter, isKrispNoiseFilterSupported } =
          await import('https://cdn.jsdelivr.net/npm/@livekit/krisp-noise-filter@0.2.16/+esm');
        if (!isKrispNoiseFilterSupported()) {
          log('Krisp bu tarayıcıda desteklenmiyor', 'info');
          return;
        }
        const micPub = room.localParticipant.getTrackPublication(Track.Source.Microphone);
        if (!micPub || !micPub.track) return;
        await micPub.track.setProcessor(KrispNoiseFilter());
        krispApplied = true;
        log('Krisp gürültü filtresi aktif', 'ok');
      } catch (e) {
        console.error('Krisp yüklenemedi:', e);
        log('Gürültü filtresi yüklenemedi, normal ses kullanılıyor', 'info');
      }
    }

    // Wake lock — dinleyen tarafın ekranı da açık kalmalı
    let wakeLock = null;
    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }

    // Ön plana gelince: wake lock'u geri al, ses context'ini uyandır, gerekirse bağlan
    // (BİR KEZ kaydedilir — joinRoom içinde değil)
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState !== 'visible') return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      acquireWakeLock();
      if (room && room.state === 'connected') {
        ensureAudioPlayback();
      } else {
        const saved = localStorage.getItem('telsiz_pw');
        if (saved) { pwInput.value = saved; await tryAuth(); }
      }
    });

    let muteTimer = null;

    async function startTalking() {
      if (isTalking || !room) return;
      isTalking = true;
      // Bekleyen kapatma varsa iptal et — hemen tekrar basıldı
      if (muteTimer) { clearTimeout(muteTimer); muteTimer = null; }
      btn.classList.add('active');
      btn.textContent = 'KONUŞUYOR';
      log('Konuşma başladı');
      await room.localParticipant.setMicrophoneEnabled(true);
      if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
    }

    async function stopTalking() {
      if (!isTalking) return;
      isTalking = false;
      btn.classList.remove('active');
      btn.textContent = 'KONUŞ';
      log('Konuşma bitti');
      // Son kelime kesilmesin: mikrofonu 700ms gecikmeyle kapat (telsiz kuyruk süresi)
      if (muteTimer) clearTimeout(muteTimer);
      muteTimer = setTimeout(async () => {
        muteTimer = null;
        if (!isTalking && room) await room.localParticipant.setMicrophoneEnabled(false);
      }, 700);
    }

    // Yeniden bağlanma
    let reconnectTimer = null;
    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(async () => {
        reconnectTimer = null;
        const saved = localStorage.getItem('telsiz_pw');
        if (!saved) return;
        log('Yeniden bağlanma denemesi...', 'info');
        pwInput.value = saved;
        await tryAuth();
      }, 3000);
    }

    // İnternet gelince otomatik bağlan
    window.addEventListener('online', () => {
      log('İnternet bağlandı', 'ok');
      if (!room || room.state !== 'connected') scheduleReconnect();
    });

    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryAuth(); });
    authBtn.addEventListener('click', tryAuth);

    btn.addEventListener('mousedown',  startTalking);
    btn.addEventListener('mouseup',    stopTalking);
    btn.addEventListener('mouseleave', stopTalking);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); });
    btn.addEventListener('touchend',   e => { e.preventDefault(); stopTalking(); });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !e.repeat && !btn.disabled && mainScreen.style.display !== 'none') {
        e.preventDefault(); startTalking();
      }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space') { e.preventDefault(); stopTalking(); }
    });
  </script>
</body>
</html>
